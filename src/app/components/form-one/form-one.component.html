<div class="card shadow w-50 mx-auto mt-5 p-4">
  <form action="" [formGroup]="myform" (ngSubmit)="handSubmit()">
    <div class="input-group my-3">
      <input
        type="text"
        class="form-control"
        name=""
        id=""
        formControlName="name"
        placeholder="Enter Name"
      />
    </div>
    <span class="text-danger" *ngIf="myform.get('name')?.hasError('required')"
      >This filed is requird</span
    >
    <div>
      <input
        type="email"
        class="form-control"
        name=""
        id=""
        formControlName="email"
        placeholder="Enter Email"
      />
    </div>
    <div class="input-group my-3">
      <input
        class="form-control"
        type="number"
        name=""
        id=""
        formControlName="name"
        placeholder="Enter Mobile No"
      />
    </div>
    <div class="input-group my-3">
      <select name="" id="" formControlName="course" class="form-control">
        <option [value]="c.id" *ngFor="let c of courses">{{ c.lebel }}</option>
      </select>
    </div>
    <div class="input-group my-3">
      <input
        class="form-control"
        type="text"
        name=""
        id=""
        formControlName="experience"
        placeholder="Enter Experience"
      />
    </div>
    <div *ngIf="myform.contains('salary')" class="input-group my-3">
      <input
        type="text"
        name=""
        id=""
        formControlName="salary"
        class="form-control"
        placeholder="Enter salary"
      />
    </div>
    <div class="m-3">
      <button type="submit" class="btn btn-success">Submit</button>
    </div>
    <div class="m-3">
      <button type="button" class="btn btn-danger" (click)="handleClick()">
        Remove salary Control
      </button>
    </div>
    <div class="m-3">
      <button type="button" (click)="addNewFormGroup()" class="btn btn-success">
        Add New Form group
      </button>
    </div>
    <div *ngIf="myform.contains('address')">
      <div formGroupName="address">
        <h5>New FormGroup</h5>
        <div class="inputgroup my-3">
          <input
            type="text"
            name=""
            id=""
            class="form-control"
            formControlName="country"
            placeholder="Enter country"
          />
        </div>
        <div class="inputgroup my-3">
          <input
            type="text"
            name=""
            id=""
            class="form-control"
            formControlName="state"
            placeholder="Enter state"
          />
        </div>
        <div class="inputgroup my-3">
          <input
            type="text"
            name=""
            id=""
            class="form-control"
            formControlName="city"
            placeholder="Enter city"
          />
        </div>
        <div class="inputgroup my-3">
          <input
            type="text"
            name=""
            id=""
            class="form-control"
            formControlName="zipcode"
            placeholder="Enter zipcode"
          />
        </div>
      </div>
    </div>
  </form>
</div>
